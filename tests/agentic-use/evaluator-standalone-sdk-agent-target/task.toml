version = "1.0"

[metadata]
author_name = "NMP Team"
difficulty = "medium"
category = "evaluator-agent-benchmark"
suite_id = "evaluator_agent_benchmark"
suite_version = "v0"
tags = ["evaluator", "agent-benchmark", "agent-target-configuration", "standalone-sdk"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false

[evaluator.surface]
constraint = "standalone_sdk"
allowed = ["standalone_sdk"]
forbidden = ["cli", "plugin_sdk", "legacy_service"]

[evaluator.expected]
required_terms = [
  "packages/nemo_evaluator_sdk",
  "Evaluator",
  "run_sync",
  "Agent",
  "nemo_evaluator_sdk.values.agents",
  "AgentFormat.GENERIC",
  "ExactMatchMetric",
  "response_path",
  "$.answer",
  "trajectory_path",
  "$.trajectory",
  "candidate_agent_runtime",
  "candidate_agent_model",
]

[evaluator]
forbidden_patterns = ["services/", "nemo evaluation", "plugin SDK"]

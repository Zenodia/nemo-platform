# test-eval.yml
#
# A minimal evaluation config using runtime metrics — no judge LLM required.
# Measures avg_workflow_runtime for each dataset item sent to the agent.
#
# Usage (against a locally-running agent started with `nemo agents run`):
#   nemo agents evaluate \
#       --eval-config examples/test-agent/test-eval.yml \
#       --endpoint http://localhost:8080/generate
#
# Usage (against the platform deployment controller's endpoint):
#   nemo agents evaluate \
#       --eval-config examples/test-agent/test-eval.yml \
#       --agent test-agent \
#       --base-url http://localhost:8080

eval:
  general:
    max_concurrency: 1
    output_dir: eval/test-agent
    dataset:
      _type: json
      file_path: test-eval-data.json
  evaluators:
    runtime:
      _type: avg_workflow_runtime

# Template config for nemo agents optimize-skills.
#
# Copy this file into your own agent's repo as ``.agent-improver.yml``,
# retarget the paths, and run:
#
#   nemo agents optimize-skills run --spec-file .agent-improver.yml
#
# To submit to a cluster instead of running locally:
#
#   nemo agents optimize-skills submit --spec-file .agent-improver.yml --cluster <url>

# ---------------------------------------------------------------------------
# Agent + evals
# ---------------------------------------------------------------------------

# Path to your eval suite. Each subdirectory must be one task with either
# task.toml (Harbor) or workflow.yml (NAT) plus instruction.md and
# tests/test_outputs.py. See tests/agentic-use/ in the NeMo Platform repo for a real
# example.
evals: ./agent-evals

# Your agent's repo root. The optimize-skills strategy is allowed to write
# only under skills_path; everything else is reverted.
agent: .

# Where YOUR agent's skills live (relative to agent). Markdown files that
# guide the agent when triggered by keywords / task patterns.
skills_path: .skills

# ---------------------------------------------------------------------------
# Eval runner
# ---------------------------------------------------------------------------

# auto | harbor | nat. auto detects from marker files (task.toml/workflow.yml).
runner: auto

# Tiebreaker when both markers are present per task (mid-migration).
prefer: nat

# Trace parser for the agent's traces. Today "claude-code" is the only
# registered parser (Claude Code session.jsonl). Future parsers — e.g.
# for NAT IntermediateStep records — extend this set.
trace_parser: claude-code

# ---------------------------------------------------------------------------
# Loop control
# ---------------------------------------------------------------------------

iterations: 3
concurrency: 4

# Trials per eval — strongly recommended >1 for verdicts you can trust.
# Containerized agentic runs commonly have 20-40% wallclock variance
# trial-to-trial from cold-cache effects; single-trial verdicts can commit
# noise as progress.
repeats: 3

# Re-run ALL evals on every verification (slow; catches cross-eval
# regressions). Default false re-runs only evals touched by the fix.
full_verification: false

# ---------------------------------------------------------------------------
# Output handling
# ---------------------------------------------------------------------------

# Detect gh / glab and auto-open a PR/MR on improvement. Default false:
# the loop produces a local branch + diff for human review.
open_pr: false

# ---------------------------------------------------------------------------
# Optional: scope to a subset
# ---------------------------------------------------------------------------

# filter_glob: "auth-*"               # only evals matching this pattern
# initial_batch: ./runs/batch-prev    # skip the initial run, use this as the baseline
# state: ./.agent-improver-state.json # custom loop state path

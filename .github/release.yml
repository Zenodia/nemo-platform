# Configures GitHub's automatically generated release notes, emitted by
# `gh release create --generate-notes` in .github/workflows/release-bundle.yaml.
# Merged PRs are grouped into sections by the labels applied by
# .github/workflows/label-pr.yaml (rules in .github/release-drafter.yml);
# `skip-changelog` is applied manually to keep a PR out of the notes.
#
# GitHub reads this file from the default branch, so it only takes effect once merged to main.
changelog:
  exclude:
    labels: [style, skip-changelog, renovate]
  categories:
    - title: "🚨 Breaking Changes"
      labels: [breaking]
    - title: "✨ New Features"
      labels: [feat]
    - title: "🔧 Improvements"
      labels: [perf, refactor]
    - title: "🐛 Bug Fixes"
      labels: [fix, revert, cp]
    - title: "📝 Documentation"
      labels: [docs]
    - title: "🧰 Maintenance"
      labels: [build, ci, test, chore]
    - title: "Other Changes"
      labels: ["*"]

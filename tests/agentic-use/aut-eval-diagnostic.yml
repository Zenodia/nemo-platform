# AUT diagnostic (LLM-judge) eval config for agentic-use.
#
# One-time plugin bootstrap (per environment):
#   uv pip install -e packages/nemo_platform_plugin -e plugins/nemo-agents
#   uv run _nemo agents evaluate run --help
#
# Build dataset:
#   python tests/agentic-use/build_aut_eval_dataset.py \
#     --manifest manifests/baseline_supported.txt
#
# Diagnostic eval only:
#   uv run _nemo --base-url http://localhost:18080 agents evaluate run --spec '{
#     "agent": "<your-agent-name>",
#     "eval_config": "tests/agentic-use/aut-eval-diagnostic.yml",
#     "output": "./eval-out",
#     "workspace": "default"
#   }'
#
# This LLM-judge evaluator is diagnostic only.
# Canonical benchmark gating uses deterministic verifier pass-rate + token totals
# (runtime as tie-breaker when token totals are tied):
#   python tests/agentic-use/passrate_token_policy_gate.py --jobs-dir nat-jobs --manifest manifests/baseline_supported.txt
#
# `eval.general.output_dir` is relative to the current working directory used to
# run `_nemo`. Override via `--spec` output path if you need results in a
# stable location.

llms:
  judge_llm:
    _type: openai
    # Local IGW provider proxy route (OpenAI-compatible path):
    # /apis/inference-gateway/v2/workspaces/{workspace}/provider/{name}/-/chat/completions
    base_url: http://localhost:18080/apis/inference-gateway/v2/workspaces/default/provider/nvidia-integrate/-
    api_key: not-used
    # Judge model is independent from AUT model selection.
    model_name: nvidia/nemotron-3-super-120b-a12b
    max_tokens: 512
    disable_streaming: true

eval:
  general:
    max_concurrency: 1
    output_dir: eval/agentic-use-aut
    dataset:
      _type: json
      # Default dataset is baseline-supported. Rebuild aut-eval-data.json with a
      # larger manifest when you want broader diagnostic coverage.
      file_path: aut-eval-data.json
      structure:
        question_key: input_obj
        answer_key: expected_output_obj
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: judge_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.5
        correctness: 0.3
        relevance: 0.2
      judge_llm_prompt: >
        Evaluate whether the generated answer is appropriate for the task prompt.
        Score from 0.0 to 1.0 and provide concise reasoning.

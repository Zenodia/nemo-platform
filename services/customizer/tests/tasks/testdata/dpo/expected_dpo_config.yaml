dpo:
  max_num_epochs: 1
  max_num_steps: 88
  steps_per_epoch: 88
  val_period: 44  # val_check_interval - 1 workaround for NeMo RL last-step checkpointing
  val_batches: 0
  val_global_batch_size: 16
  val_micro_batch_size: 1
  val_at_start: true
  seed: 42
  reference_policy_kl_penalty: 0.05
  preference_average_log_probs: false
  sft_average_log_probs: false
  preference_loss_weight: 1
  sft_loss_weight: 0
checkpointing:
  enabled: true
  checkpoint_dir: /mount/workspaces/dpo/workspace-dpo-llama-3_2_1b/checkpoints
  metric_name: val:validation-default_loss
  higher_is_better: false
  keep_top_k: 1
  save_period: 44  # matches val_period to ensure validation metrics are available
  checkpoint_must_save_by: null
policy:
  model_name: /mount/models/llama-3_2-1b-instruct-hf
  tokenizer:
    name: /mount/models/llama-3_2-1b-instruct-hf
    chat_template: '{% for message in messages %}{% set content = ''<|start_header_id|>''
      + message[''role''] + ''<|end_header_id|>


      ''+ message[''content''] | trim + ''<|eot_id|>'' %}{% if loop.index0 == 0 %}{%
      set content = bos_token + content %}{% endif %}{{ content }}{% endfor %}{% if
      add_generation_prompt %}{{ ''<|start_header_id|>assistant<|end_header_id|>


      '' }}{% endif %}'
  train_global_batch_size: 16
  train_micro_batch_size: 1
  max_total_sequence_length: 2048
  precision: bfloat16
  fsdp_offload_enabled: false
  activation_checkpointing_enabled: false
  dtensor_cfg:
    enabled: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: false
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
  dynamic_batching:
    enabled: false
  sequence_packing:
    enabled: false
  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
  max_grad_norm: 1.0
  optimizer:
    kwargs:
      lr: 5.0e-06
      weight_decay: 0.01
      betas:
      - 0.9
      - 0.99
      eps: 1.0e-05
      foreach: false
      fused: false
    name: torch.optim.AdamW
  scheduler:
  - name: torch.optim.lr_scheduler.LinearLR
    kwargs:
      start_factor: 1.0e-05
      end_factor: 1.0
      total_iters: 200
  - name: torch.optim.lr_scheduler.CosineAnnealingLR
    kwargs:
      T_max: 1
      eta_min: 0.0
  - milestones:
    - 200
data:
  dataset_name: dpo-convo
  train_data_path: /mount/nmp/services/customizer/tests/tasks/testdata/dpo/dpo-convo/training.jsonl
  val_data_path: /mount/nmp/services/customizer/tests/tasks/testdata/dpo/dpo-convo/validation.jsonl
  max_input_seq_length: 2048
  add_bos: false
  add_eos: true
  shuffle: false
  seed: 42
  num_workers: 1
logger:
  log_dir: /mount/workspaces/dpo/workspace-dpo-llama-3_2_1b/logs
  tensorboard_enabled: false
  monitor_gpus: false
  wandb_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10
cluster:
  gpus_per_node: 1
  num_nodes: 1

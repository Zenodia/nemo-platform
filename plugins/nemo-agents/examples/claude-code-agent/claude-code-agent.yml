# claude-code-agent.yml
#
# A Claude Code-backed NAT workflow for local coding tasks.
#
# Requires the claude and nemo-relay CLIs to be installed and available on PATH,
# with Claude Code authentication already configured.
#
# Platform-managed deployment:
#   nemo agents create --name claude-code-agent --agent-config examples/claude-code-agent/claude-code-agent.yml
#   nemo agents deploy --agent claude-code-agent
#   nemo agents invoke --agent claude-code-agent \
#       --input "Read pyproject.toml and say only the project name. Do not edit files."

workflow:
  _type: claude_code_agent
  command: claude
  # Change this to the repository or workspace Claude Code should operate in.
  working_directory: .
  permission_mode: plan
  model: sonnet
  setting_sources: [project]
  max_budget_usd: 1.00
  timeout_seconds: 300
  max_output_chars: 12000
  relay_atof_output_dir: ./.tmp/nemo-relay-claude-code-atof
  disallowed_tools:
    - Bash
    - Edit
    - MultiEdit
    - NotebookEdit
    - Write

general:
  telemetry:
    tracing:
      nemo_trace:
        _type: nemo_files
        # workspace and agent_name are injected at deploy time
        batch_size: 128

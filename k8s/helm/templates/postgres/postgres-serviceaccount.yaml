{{- if and .Values.postgresql.enabled .Values.postgresql.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nemo-common.postgresql.serviceAccountName" . }}
  labels:
    app.kubernetes.io/component: postgres
    {{- include "nemo-platform.labels" . | nindent 4 }}
  {{- with .Values.postgresql.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.postgresql.serviceAccount.automount }}
{{- end }}

version = "1.0"

[metadata]
author_name = "NeMo Platform Team"
difficulty = "hard"
category = "cli-intake"
tags = ["intake", "export", "files", "cli", "async-job"]

[verifier]
timeout_sec = 60.0

[agent]
# Increased timeout: agent must discover intake API (no CLI/SDK), create app,
# submit multiple entries, create export job, and verify output.
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true

[verifier.env]

# nemo-agent-improver: optimize NeMo's agent skills against Harbor evals.
#
# This config improves NeMo itself — the "agent under improvement" is Claude
# Code using NeMo Platform's CLI/SDK via the skills under .agents/skills/. The
# optimize-skills loop runs the Harbor agentic-use evals, analyzes failures
# and inefficiencies, and asks Claude to update the skills. It supplants the
# in-tree tools/self_improve/ package from PR #38 — same workflow, now
# packaged as a NeMo plugin command.
#
# Prerequisites:
#   - docker (daemon running) and the harbor CLI on PATH
#   - claude CLI authenticated locally (the loop spawns it as a subprocess)
#   - ANTHROPIC_API_KEY + ANTHROPIC_BASE_URL exported (used for the agent
#     under test inside the harbor container, and for the LLM analyzer pass)
#
# Usage (from the repo root):
#   export ANTHROPIC_API_KEY='<your-key>'
#   export ANTHROPIC_BASE_URL='https://inference-api.nvidia.com'
#   nemo agents optimize-skills run --spec-file .agent-improver.yml
#
# Single-eval debug run — edit `filter_glob` and `iterations` in this file,
# or copy it and pass the copy via --spec-file.
#
# Use as a template for any other agent: copy this file into your agent's
# repo, retarget --evals at your eval suite, and point --skills-path at where
# YOUR agent's skills live.

# ---------------------------------------------------------------------------
# Agent + evals
# ---------------------------------------------------------------------------

# The Harbor agentic-use eval suite — discovered as task.toml-marked dirs.
evals: tests/agentic-use

# Agent root: this repo. The optimize-skills strategy is allowed to write
# only under skills_path; the loop's post-edit guard reverts any change
# outside it (and the eval directory is invariant for all strategies).
agent: .

# Where NeMo's Claude skills live. The strategy can write here, and only
# here. Skills are markdown files that give Claude contextual guidance when
# triggered by keywords in a task.
skills_path: .agents/skills

# ---------------------------------------------------------------------------
# Eval runner
# ---------------------------------------------------------------------------

# auto-detect from marker files: task.toml -> harbor, workflow.yml -> nat.
# Today every discovered eval under tests/agentic-use/ ships both markers,
# so "prefer" — nominally the tiebreaker — fires for every eval.
runner: auto
prefer: nat

# Trace parser for the agent's traces. Today "claude-code" is the only
# registered parser (parses the Claude Code session.jsonl that Harbor
# writes for every claude-code-backed eval). When parsers for other
# trace formats land — e.g. NAT IntermediateStep records via the
# nemo-files exporter — they become selectable here.
trace_parser: claude-code

# ---------------------------------------------------------------------------
# Loop control
# ---------------------------------------------------------------------------

# Max iterations before giving up. Each iteration: re-runs the relevant
# evals, asks the LLM analyzer for hypotheses, picks one, has Claude edit
# skills, verifies improvement.
iterations: 3

# Parallel evals (across distinct evals; trials within an eval are
# sequential). NAT subprocess mode contends on per-task provider seeding
# in parallel; default to 1 and let users opt in to higher parallelism.
concurrency: 1

# Trials per eval. >1 enables median aggregation for duration / tokens /
# tool calls and majority-vote for pass/fail (any error -> error). Strongly
# recommended >1 for verdicts you trust — cold-cache variance on Harbor
# routinely exceeds 5% wallclock trial-to-trial.
repeats: 3

# When True, every iteration re-runs the full eval suite (slow, expensive,
# catches cross-eval regressions). Default False — only re-runs the evals
# touched by the proposed fix.
full_verification: false

# ---------------------------------------------------------------------------
# Output handling
# ---------------------------------------------------------------------------

# Auto-open a PR/MR on improvement. Detects gh (github.com remote) or glab
# (gitlab remote) automatically. Default false: produce a local branch and
# diff for review, push manually. Flip when you trust the loop enough to
# let it ship work end-to-end.
open_pr: false

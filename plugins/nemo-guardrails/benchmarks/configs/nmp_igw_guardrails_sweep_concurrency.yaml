# Benchmark NMP IGW VirtualModel with nemo-guardrails request/response middleware.

batch_name: nmp_igw_guardrails_sweep_concurrency
output_base_dir: plugins/nemo-guardrails/benchmarks/artifacts/aiperf_results

base_config:
  model: benchmark/guardrails-vm
  # AIPerf only needs the tokenizer to count input/output tokens for its
  # metrics; the actual model under test is the mock IGW VirtualModel above.
  # We use Qwen3-8B (instead of Llama 3.3, which is gated) so CI can fetch
  # the tokenizer without an HF Token.
  tokenizer: Qwen/Qwen3-8B
  # The benchmark runs a required health check at `/v1/models`. Until this
  # endpoint is configurable, we run a thin shim on :8090 that satisfies that probe.
  # See nemo_guardrails_plugin.benchmarks.shim for the implementation.
  url: "http://localhost:8090"
  endpoint: "/v1/chat/completions"
  endpoint_type: chat
  streaming: false

  warmup_request_count: 10
  benchmark_duration: 60
  concurrency: 0
  request_rate_mode: constant

  random_seed: 12345
  prompt_input_tokens_mean: 100
  prompt_input_tokens_stddev: 10
  prompt_output_tokens_mean: 50
  prompt_output_tokens_stddev: 5

sweeps:
  concurrency: [1, 2, 4, 8, 16, 32, 64]

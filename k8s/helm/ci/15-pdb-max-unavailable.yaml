# Test that PodDisruptionBudget renders with maxUnavailable.
# CI validates by running: helm template nemo-platform . -f ci/15-pdb-max-unavailable.yaml
# The rendered output must include a PodDisruptionBudget for the API with spec.maxUnavailable: 1.

api:
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1


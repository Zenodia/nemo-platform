[project]
name = "safe-synthesizer-sdk"
version = "0.0.0"
description = "Safe Synthesizer SDK for NeMo Platform"
authors = [{ name = "NVIDIA", email = "nemo@nvidia.com" }]
requires-python = ">=3.11,<3.14"

classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
]

dependencies = [
  # TODO: We will add the dep on nemo-safe-synthesizer once it's available/easily installable
  "nemo-platform-sdk",
  "pandas>=1.5.3",
]

[dependency-groups]
dev = [
  "nemo-platform-sdk",
  "pytest>=8.3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
cache-keys = [{ file = "pyproject.toml" }]

[tool.vendor-package]
package = "safe_synthesizer_sdk"
package_root = "packages/safe_synthesizer_sdk"
target_sdk_module = "beta.safe_synthesizer"
sdk_optional_dependencies_name = "safe-synthesizer"
included_paths = ["**/*.py"]

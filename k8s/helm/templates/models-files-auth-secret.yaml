---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nemo-platform.modelsFilesAuthSecretName" . }}
  labels:
    {{- include "nemo-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Placeholder for NIMCache when pulling from Files service HF-compatible API (FILES_SERVICE / FILES_SERVICE_SFT).
  # Files acts as pull-through; this value is used for auth to the platform, not to Hugging Face directly.
  HF_TOKEN: "service:models"

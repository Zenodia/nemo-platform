[pytest]
# Pytest configuration for NeMo Files Service
# This mirrors the root pytest.ini configuration for standalone test runs

# Python files and directories to search for tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
pythonpath = ["src", "../../../.."]

# Test discovery paths
testpaths = tests

# Markers for different test categories
markers =
    integration: Integration tests - test service interfaces and interactions between systems
    e2e: End-to-end tests - test complete customer workflows and blueprints
    regression: Regression tests - test individual functional microservices for baseline functionality
    slow: Tests that take a long time to run
    skip_in_ci: Tests that should be skipped in CI environment
    unit: Unit tests - test single classes/functions with no infrastructure dependencies
    unit_test: Legacy marker for unit tests (deprecated, use 'unit' instead)
    noautouse: Marker to skip autouse fixtures for specific tests

# Asyncio configuration
asyncio_default_fixture_loop_scope = function
asyncio_mode = auto

# Output options
addopts = 
    --verbose
    --tb=short
    -W ignore::UserWarning:pytest_only.version

# Minimum Python version
minversion = 8.0

# Test timeout (in seconds)
timeout = 300
timeout_method = thread

# Log configuration
log_cli = false
log_cli_level = INFO

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:pytest_only.version

# Paths to ignore during test collection
norecursedirs = 
    .git
    .tox
    dist
    build
    .venv
    __pycache__
    *.egg-info


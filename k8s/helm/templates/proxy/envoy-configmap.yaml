{{- if and (include "nemo-platform.authEnabled" .) .Values.envoyProxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nmp-envoy.servicename" . }}
  labels:
    {{- include "nmp-envoy.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{ .Values.envoyProxy.adminPort }}
    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.envoyProxy.service.port }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    stream_idle_timeout: {{ .Values.envoyProxy.timeouts.streamIdle | quote }}
                    request_headers_timeout: {{ .Values.envoyProxy.timeouts.requestHeaders | quote }}
                    request_timeout: {{ .Values.envoyProxy.timeouts.request | quote }}
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    route_config:
                      name: passthrough_route
                      internal_only_headers:
                      {{- range .Values.envoyProxy.trustedHeaders }}
                        - {{ . }}
                      {{- end }}
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: backend_cluster
                                timeout: {{ .Values.envoyProxy.timeouts.route | quote }}
      clusters:
        - name: backend_cluster
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          connect_timeout: {{ .Values.envoyProxy.timeouts.connect | quote }}
          load_assignment:
            cluster_name: backend_cluster
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "nmp-api.api-servicename" . }}
                          port_value: {{ .Values.api.service.port }}
{{- end }}

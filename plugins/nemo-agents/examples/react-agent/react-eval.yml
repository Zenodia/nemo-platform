# react-eval.yml
#
# Evaluation config for the react agent.
# The agent runs remotely (already deployed).  Pass its name if it is platform-managed:
#
#   nemo agents evaluate run \
#       --eval-config examples/react-agent/react-eval.yml \
#       --agent react-agent

llms:
  llm:
    _type: openai
    model_name: nvidia-nemotron-3-nano-30b-a3b
    temperature: 0.0
    max_tokens: 1024

  judge_llm:
    _type: openai
    model_name: nvidia-nemotron-3-super-120b-a12b
    temperature: 0.0
    max_tokens: 1024

eval:
  general:
    max_concurrency: 4
    output_dir: eval/react-agent
    dataset:
      _type: json
      file_path: react-eval-data.json
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: judge_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.5
        correctness: 0.3
        relevance: 0.2
      judge_llm_prompt: >
        You are an evaluator. Score whether the generated answer correctly
        addresses the question compared to the expected answer description.
        Rules:
        - Score is a float between 0.0 and 1.0.
        - 1.0 means the answer fully satisfies the expected answer criteria.
        - Provide a 1-2 sentence reasoning.
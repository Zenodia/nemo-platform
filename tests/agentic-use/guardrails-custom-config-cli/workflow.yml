# NAT workflow configuration for this agentic-use eval task.
# Run with:  nat run --config_file workflow.yml --input "$(cat instruction.md)"
#
# The nemo_tools function group exposes all NeMo Platform operations (workspaces, files,
# secrets, entities, evaluator, inference, etc.) via the nemo-mcp MCP server.
# This replaces the previous nemo / nmp CLI approach used with Claude Code.
#
# Required environment variables:
#   NVIDIA_API_KEY  - API key for the NIM LLM (https://build.nvidia.com)
#   NMP_BASE_URL    - URL of the running NeMo Platform API (default: http://localhost:8080)

functions:
  nemo_tools:
    _type: mcp_client
    server:
      transport: stdio
      command: /app/.venv/bin/nemo-mcp
      args:
        - "--base-url"
        - "http://localhost:8080"
    tool_call_timeout: 120

llms:
  primary_llm:
    _type: nim
    model_name: nvidia/llama-3.1-nemotron-70b-instruct
    temperature: 0.0
    chat_template_kwargs:
      enable_thinking: false

workflow:
  _type: react_agent
  llm_name: primary_llm
  tool_names:
    - nemo_tools
  verbose: true
  parse_agent_response_max_retries: 3

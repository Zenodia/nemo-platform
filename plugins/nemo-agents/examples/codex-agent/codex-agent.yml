# codex-agent.yml
#
# A Codex-backed NAT workflow for local coding tasks.
#
# Requires the codex and nemo-relay CLIs to be installed and available on PATH,
# with Codex authentication already configured.
#
# Platform-managed deployment:
#   nemo agents create --name codex-agent --agent-config examples/codex-agent/codex-agent.yml
#   nemo agents deploy --agent codex-agent
#   nemo agents invoke --agent codex-agent \
#       --input "Read pyproject.toml and say only the project name. Do not edit files."

workflow:
  _type: codex_agent
  # Change this to the repository or workspace Codex should operate in.
  working_directory: .
  sandbox_mode: read-only
  approval_policy: never
  skip_git_repo_check: false
  timeout_seconds: 300
  max_output_chars: 12000
  relay_atof_output_dir: ./.tmp/nemo-relay-codex-atof
  prefer_chatgpt_auth: true

general:
  telemetry:
    tracing:
      nemo_trace:
        _type: nemo_files
        # workspace and agent_name are injected at deploy time
        batch_size: 128

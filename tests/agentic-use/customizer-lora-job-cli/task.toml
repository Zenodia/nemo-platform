version = "1.0"

[metadata]
author_name = "NeMo Platform Team"
difficulty = "hard"
category = "customizer"
tags = ["customizer", "lora", "sft", "gpu", "training"]

[verifier]
timeout_sec = 120.0

[agent]
# LoRA training on a small model takes 10-20 minutes
timeout_sec = 1800.0

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 16384
storage_mb = 30720
# GPU access is provided via environment/docker-compose.yaml (nvidia device reservation)
# rather than task.toml gpus field, because Harbor's Docker env doesn't support gpus natively
gpus = 0
allow_internet = true

[verifier.env]

{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nemo-platform.name" . }}
  labels:
    {{- include "nemo-platform.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.defaultHost }}
    {{- if not .Values.ingress.hosts }}
    {{- fail "ingress.hosts must contain at least one entry with paths when ingress.defaultHost is set" }}
    {{- end }}
    {{- $defaultHostPaths := (index .Values.ingress.hosts 0).paths }}
    {{- if not $defaultHostPaths }}
    {{- fail "ingress.hosts[0].paths must contain at least one path when ingress.defaultHost is set" }}
    {{- end }}
    - host: {{ .Values.ingress.defaultHost | quote }}
      http:
        paths:
          {{- range $defaultHostPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ tpl .service $ }}
                port:
                  number: {{ tpl .port $ | int }}
          {{- end }}
    {{- else }}
    {{- range .Values.ingress.hosts }}
    - {{- if .name }}
      host: {{ .name | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ tpl .service $ }}
                port:
                  number: {{ tpl .port $ | int }}
          {{- end }}
    {{- end }}
    {{- end }}
{{- end }}

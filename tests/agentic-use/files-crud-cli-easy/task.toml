version = "1.0"

[metadata]
author_name = "NeMo Platform Team"
difficulty = "easy"
category = "cli-files"
tags = ["files", "filesets", "crud", "cli"]

[verifier]
timeout_sec = 60.0

[agent]
# Bumped +180s to absorb AUT inference latency variance.
# Effective timeout = max(runner --timeout default 600s, task value); set
# above the runner default so the +180s is not clamped away.
timeout_sec = 780.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true

[verifier.env]

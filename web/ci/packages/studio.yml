# Studio Package Rules and Jobs

# Rules for Studio changes
.rules:studio-changes: &studio_changes
  changes:
    paths:
      - web/packages/studio/**/*
      - web/packages/common/**/*
      - web/packages/sdk/**/*

##################
###  TESTS  ###
##################

# STUDIO
web:studio:deps:
  extends: .pnpm
  needs: []
  stage: test
  script:
    - pnpm deps:studio
  rules:
    - *studio_changes

##################
###   BUILD   ###
##################

# Build and extract license files for compliance documentation
licenses:extract:
  extends: .pnpm
  stage: build
  script:
    # Build UI package to generate LICENSES.txt
    - echo "Building nemo-studio-ui to extract licenses..."
    - pnpm --filter ${PKG_NAME_UI} build

    # Create a dedicated directory for license artifacts
    - mkdir -p licenses-output

    # Copy license files with descriptive names
    - cp packages/studio/dist/LICENSES.txt licenses-output/nemo-studio-ui-LICENSES.txt

    # Generate a combined license file
    - echo "====================" > licenses-output/LICENSES-COMBINED.txt
    - echo "NEMO STUDIO UI" >> licenses-output/LICENSES-COMBINED.txt
    - echo "====================" >> licenses-output/LICENSES-COMBINED.txt
    - echo "" >> licenses-output/LICENSES-COMBINED.txt
    - cat packages/studio/dist/LICENSES.txt >> licenses-output/LICENSES-COMBINED.txt

    # Display summary
    - echo "License files extracted successfully!"
    - ls -lh licenses-output/
  # artifacts:
  #   name: 'licenses-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}'
  #   paths:
  #     - licenses-output/
  #   expire_in: never
  #   expose_as: 'Third-Party Licenses'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $CI_COMMIT_TAG != null
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

##################
###     E2E    ###
##################

# TODO: Reenable when transition is complete
web:studio:e2e:
  extends: .pnpm
  stage: e2e
  rules:
    # Triggered by a schedule created via Build > Pipeline schedules
    # - if: '$CI_PIPELINE_SOURCE == "schedule"'
    #   when: always
    #   allow_failure: false
    # - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    #   when: always
    #   <<: *studio_changes
    # Support manual trigger as well.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
      <<: *studio_changes
  script:
    - apt-get update && apt-get install -y gettext-base jq
    - pnpm --filter ${PKG_NAME_UI} exec playwright install --with-deps
    - CI=1 pnpm --filter ${PKG_NAME_UI} test:e2e
  # SLACK_BOT_TOKEN and SLACK_CHANNEL are configured via CI settings
  # <<: *slack_notification_e2e

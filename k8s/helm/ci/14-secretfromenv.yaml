# Test envFromSecret: use an external secret for API pod env vars (no default api-env secret created or generated).
# CI validates by running: helm template nemo-platform . -f ci/14-secretfromenv.yaml
# When envFromSecret is set: the api-env Secret template must not render; the API deployment
# must reference this secret name in envFrom.

envFromSecret: "my-external-api-env"

{{- if .Values.core.enabled }}
{{- if .Values.core.jobs.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nmp-core.jobsServiceAccountName" . }}
  labels:
    app.kubernetes.io/component: nmp-core-jobs
    {{- include "nemo-platform.labels" . | nindent 4 }}
  {{- with .Values.core.jobs.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.core.jobs.serviceAccount.automount }}
{{- end }}
{{- end }}

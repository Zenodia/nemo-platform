# Test that topologySpreadConstraints are correctly templated for API and core controller deployments.
# CI validates by running: helm template nemo-platform . -f ci/12-topology-spread-constraints.yaml
# The rendered output must include topologySpreadConstraints in both deployment pod specs.

api:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: nmp-api

core:
  controller:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: nmp-core-controller

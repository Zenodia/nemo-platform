# Provider seeding manifest for AUT benchmark runs.
#
# Only consumed when --aut-seed-providers is set (ephemeral/quickstart
# environments).  Each entry creates a platform secret (from the named env
# var) and an inference provider.  Entries whose env var is unset are
# silently skipped with a warning so partial configurations still work.
#
# Duplicate `from_env` values across entries are fine — if two providers
# both need NVIDIA_API_KEY, just say so on both.

providers:
  - name: nvidia-build
    host_url: https://integrate.api.nvidia.com
    secret_name: ngc-api-key
    from_env: NVIDIA_API_KEY

  - name: nvidia-inference-api
    host_url: https://inference-api.nvidia.com
    secret_name: inference-nvidia-api-key
    from_env: INFERENCE_NVIDIA_API_KEY
    wait_for_discovery: true
    discovery_timeout_sec: 120

# VirtualModels to create after all providers are seeded and have completed
# model discovery. Entity IDs use the workspace-prefixed dash form that the
# reconciler auto-assigns (slashes/dots → dashes, workspace prefix prepended).
virtual_models:
  - name: vm-opus-nemotron-random
    # Must wait until nvidia-inference-api discovery populates these entities.
    depends_on_provider: nvidia-inference-api
    models:
      - model: "default/aws-anthropic-claude-opus-4-5"
        backend_format: "ANTHROPIC_MESSAGES"
      - model: "default/nvidia-nvidia-nemotron-nano-31b-v3"
        backend_format: "OPENAI_CHAT"
    request_middleware:
      - name: "nemo-switchyard"
        config_type: "random_routing"
        config:
          strong:
            model: "default/aws-anthropic-claude-opus-4-5"
          weak:
            model: "default/nvidia-nvidia-nemotron-nano-31b-v3"
          strong_probability: 0.5
          enable_stats: false
      - name: "nemo-switchyard"
        config_type: "translate"
        config:
          target_format: "auto"
          enable_stats: false
    response_middleware:
      - name: "nemo-switchyard"
        config_type: "translate"
        config:
          target_format: "auto"
          enable_stats: false

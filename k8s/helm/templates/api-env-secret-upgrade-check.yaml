{{- if include "nemo-platform.requireExistingGeneratedDefaultEncryptionKey" . }}
{{- $secretName := include "nemo-platform.apiEnvSecretName" . -}}
{{- $keyName := include "nemo-platform.defaultEncryptionKeyEnvName" . -}}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- if not $secret -}}
{{- fail (printf "generated API env Secret %s/%s is missing during upgrade; restore the original Secret instead of generating a new encryption key" .Release.Namespace $secretName) -}}
{{- end -}}
{{- if not (hasKey ($secret.data | default dict) $keyName) -}}
{{- fail (printf "generated API env Secret %s/%s is missing key %s during upgrade; restore the original key instead of generating a new encryption key" .Release.Namespace $secretName $keyName) -}}
{{- end -}}
{{- end }}

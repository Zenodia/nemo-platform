organization:
  name: NeMo Platform Test

targets:
  python:
    project_name: nemo-platform
    package_name: nemo_platform
    production_repo:
    options:
      disable_pydantic_namespace_protection: true

environments:
  production: http://nemo.test/

query_settings:
  nested_format: 'brackets'

settings:
  disable_mock_tests: true
  license: Apache-2.0

pagination:
- name: default_pagination
  type: page_number
  request:
    page:
      type: integer
      x-stainless-pagination-property:
        purpose: page_number_param
    page_size:
      type: integer
    sort:
      type: string
  response:
    data:
      type: array
      items:
        type: object
        additionalProperties: true
    sort:
      type: string
    pagination:
      type: object
      properties:
        page:
          type: integer
          title: Page
          description: The current page number.
        page_size:
          type: integer
          title: Page Size
          description: The page size used for the query.
        current_page_size:
          type: integer
          title: Current Page Size
          description: The size for the current page.
        total_pages:
          type: integer
          title: Total Pages
          description: The total number of pages.
        total_results:
          type: integer
          title: Total Results
          description: The total number of results.

streaming:
  on_event:
  - data_starts_with: '[DONE]'
    handle: done
  - event_type: error
    handle: error
  - event_type:
    handle: yield

resources:
  $shared:
    models:
      error_response: ErrorResponse
      job_status: JobStatus
      ownership: Ownership

      # Inference specific
      chat_completion_message: ChatCompletionMessage

      # Model specific
      api_endpoint_data: APIEndpointData

  chat:
    subresources:
      completions:
        models:
          chat_completion_request: ChatCompletionRequest
          chat_completion_response: ChatCompletionResponse
          chat_completion_stream_response: ChatCompletionStreamResponse
        methods:
          create:
            endpoint: post /v1/chat/completions
            type: http
            streaming:
              param_discriminator: stream
              stream_event_model: chat.completions.chat_completion_stream_response

  customization:
    models:
      customization_config: CustomizationConfigOutput
    subresources:
      configs:
        models:
          customization_config_update: CustomizationConfigUpdate
        methods:
          list:
            endpoint: get /v1/customization/configs
            paginated: default_pagination
          update: patch /v1/customization/configs/{namespace}/{config_name}

  beta:
    subresources:
      data_designer:
        subresources:
          jobs:
            models:
              data_designer_config: "#/components/schemas/DataDesignerConfig"
              data_designer_job: "#/components/schemas/DataDesignerJob"
            subresources:
              results:
                models:
                  data_designer_result: "#/components/schemas/DataDesignerResult"
                methods:
                  retrieve: get /v1beta1/data-designer/jobs/{job_id}/results/{result_id}
            methods:
              list: get /v1beta1/data-designer/jobs

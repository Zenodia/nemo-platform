# AUT optimization config for agentic-use.
#
# This config lives in tests/agentic-use/ (not next to the AUT) on purpose:
# optimization parameters here are scoped to *this benchmark suite* — same
# dataset, same manifest, same verifier contract.
#
# Build dataset:
#   python tests/agentic-use/build_aut_eval_dataset.py --all
#
# Optimize:
#   nemo agents optimize run \
#     --optimize-config tests/agentic-use/aut-optimize.yml \
#     --agent <your-agent-name>
#
# This config is for local optimizer experimentation only.
# Benchmark baseline/candidate promotion is gated by:
#   1) verifier pass-rate floor
#   2) token total minimization (runtime only as tie-breaker)
# via tests/agentic-use/passrate_token_policy_gate.py.
# Runtime below is an optimizer-side proxy metric, not the canonical
# benchmark promotion signal.

llms:
  llm:
    _type: openai
    model_name: nvidia-nemotron-3-nano-30b-a3b
    temperature: 0.0
    optimizable_params:
      - temperature
      - top_p
    search_space:
      temperature:
        low: 0.0
        high: 0.8
        step: 0.2
      top_p:
        low: 0.5
        high: 1.0
        step: 0.1

eval:
  general:
    max_concurrency: 2
    output_dir: eval/agentic-use-aut
    dataset:
      _type: json
      file_path: aut-eval-data.json
  evaluators:
    runtime:
      _type: trajectory
      direction: maximize

optimizer:
  output_path: optimizer_results/agentic-use-aut
  numeric:
    enabled: true
    n_trials: 8
  prompt:
    enabled: false
  reps_per_param_set: 2
  eval_metrics:
    runtime:
      evaluator_name: runtime
      direction: maximize
      weight: 1.0

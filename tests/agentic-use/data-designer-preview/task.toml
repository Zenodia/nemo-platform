version = "1.0"

[metadata]
author_name = "Matt Staats"
difficulty = "hard"
category = "data-designer"
tags = ["data-designer", "preview", "sampler", "llm", "cli"]

[verifier]
# LLM-generated columns make preview calls slow (~30-60s for inference)
timeout_sec = 300.0

[agent]
# Agent needs to explore CLI/SDK, understand config format (including LLM columns
# and model configs), construct config, and run preview. 20 minutes due to
# Bedrock inference latency (~30-60s/step) and LLM column complexity.
timeout_sec = 1200.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true

[verifier.env]

version = "1.0"

[metadata]
author_name = "NMP Team"
difficulty = "easy"
category = "evaluator-agent-benchmark"
suite_id = "evaluator_agent_benchmark"
suite_version = "v0"
tags = ["evaluator", "agent-benchmark", "evaluation-execution", "standalone-sdk"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false

[evaluator.surface]
constraint = "standalone_sdk"
allowed = ["standalone_sdk"]
forbidden = ["cli", "plugin_sdk", "legacy_service"]

[evaluator.expected]
required_terms = [
  "Evaluator",
  "run_sync",
  "ExactMatchMetric",
  "print_summary",
  "2+2?",
  "Capital of France?",
  "0.5",
]

[evaluator]
forbidden_patterns = ["services/", "nemo evaluation", "plugin SDK"]

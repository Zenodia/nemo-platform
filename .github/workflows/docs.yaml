name: Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "openapi/openapi.yaml"
      - ".github/workflows/docs.yaml"
  push:
    branches: [main]
    tags: ["**"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "openapi/openapi.yaml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: read
  pull-requests: write

env:
  PAGES_BRANCH: gh-pages
  DOCS_PREVIEW_BASE_URL: https://jubilant-adventure-g4rv38m.pages.github.io

jobs:
  build:
    name: Build docs
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch docs image assets
        shell: bash
        run: |
          git lfs install --local
          git lfs pull --include="docs/images/**" --exclude=""
          for asset in docs/assets/favicon.ico docs/assets/nvidia-logo-white.png docs/images/main_nv_logo_square.png docs/images/favicon.ico docs/images/nvidia-logo-white.png; do
            if head -n 1 "$asset" | grep -q '^version https://git-lfs.github.com/spec/v1$'; then
              echo "::error file=${asset}::Docs asset is a Git LFS pointer; GitHub Pages would publish a broken image."
              exit 1
            fi
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build documentation
        shell: bash
        run: |
          set -o pipefail
          make -C docs publish 2>&1 | tee build.log

      - name: Check for errors
        if: always()
        run: |
          if grep -qE "^(ERROR|CRITICAL)" build.log; then
            echo "::error::MkDocs build produced errors"
            grep -E "^(ERROR|CRITICAL)" build.log
            exit 1
          fi
          echo "Build completed successfully"

      - name: Upload site artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
          retention-days: 14

      - name: Add PR comment with review instructions
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository &&
          success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- docs-build-artifact -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '### Documentation build succeeded',
              '',
              '**To review the docs locally:**',
              `1. Download the \`docs-site\` artifact from the [Actions run](${runUrl})`,
              '2. Unzip and open `index.html` in your browser',
              '',
              '**Or build from source:**',
              '```bash',
              'make -C docs live',
              '```',
              'Then open http://127.0.0.1:8000',
              '',
              'To include temporarily hidden docs locally:',
              '```bash',
              'make -C docs live-with-unready',
              '```',
            ].join('\n');

            // Check if we already posted a comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker) || c.body.includes('Documentation build succeeded'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  deploy-pages:
    name: Deploy docs to GitHub Pages
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-${{ github.repository }}-gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch docs image assets
        shell: bash
        run: |
          git lfs install --local
          git lfs pull --include="docs/images/**" --exclude=""
          for asset in docs/assets/favicon.ico docs/assets/nvidia-logo-white.png docs/images/main_nv_logo_square.png docs/images/favicon.ico docs/images/nvidia-logo-white.png; do
            if head -n 1 "$asset" | grep -q '^version https://git-lfs.github.com/spec/v1$'; then
              echo "::error file=${asset}::Docs asset is a Git LFS pointer; GitHub Pages would publish a broken image."
              exit 1
            fi
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve GitHub Pages URL
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PAGES_URL=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq .html_url)
          echo "url=${PAGES_URL%/}/" >> "$GITHUB_OUTPUT"

      - name: Deploy docs
        shell: bash
        env:
          DOCS_SITE_URL: ${{ steps.pages.outputs.url }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#docs/}"
            VERSION="${VERSION#v}"
            make -C docs deploy-pages DOCS_SITE_URL="${DOCS_SITE_URL}" DOCS_VERSION="${VERSION}" DOCS_ALIAS=latest
          else
            make -C docs deploy-pages DOCS_SITE_URL="${DOCS_SITE_URL}"
          fi

  deploy-pr-preview:
    name: Deploy PR docs preview
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-${{ github.repository }}-gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch docs image assets
        shell: bash
        run: |
          git lfs install --local
          git lfs pull --include="docs/images/**" --exclude=""
          for asset in docs/assets/favicon.ico docs/assets/nvidia-logo-white.png docs/images/main_nv_logo_square.png docs/images/favicon.ico docs/images/nvidia-logo-white.png; do
            if head -n 1 "$asset" | grep -q '^version https://git-lfs.github.com/spec/v1$'; then
              echo "::error file=${asset}::Docs asset is a Git LFS pointer; GitHub Pages would publish a broken image."
              exit 1
            fi
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy PR preview
        env:
          PAGES_URL: ${{ env.DOCS_PREVIEW_BASE_URL }}/
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: make -C docs deploy-pr-preview PR_NUMBER="${PR_NUMBER}" PR_PREVIEW_SITE_URL="${PAGES_URL}pr-preview/pr-${PR_NUMBER}/"

      - name: Add PR preview comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ env.DOCS_PREVIEW_BASE_URL }}/pr-preview/pr-${{ github.event.pull_request.number }}/pr-${{ github.event.pull_request.number }}/
        with:
          script: |
            const marker = '<!-- docs-preview-url -->';
            const previewUrl = process.env.PREVIEW_URL;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              '### Documentation preview is ready',
              '',
              `Preview: [${previewUrl}](${previewUrl})`,
              '',
              `Built from \`${shortSha}\` in [workflow run](${runUrl}).`,
              '',
              'This preview is deployed from this PR branch, updates when docs changes are pushed, and will be removed when the PR closes.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-pr-preview:
    name: Cleanup PR docs preview
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-${{ github.repository }}-gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete PR preview
        run: make -C docs delete-pr-preview PR_NUMBER="${{ github.event.pull_request.number }}"

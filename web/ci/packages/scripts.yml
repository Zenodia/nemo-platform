# Scripts Package Rules and Jobs

# Rules for scripts changes
.rules:script-changes: &rules_script_changes
  rules:
    - changes:
        paths:
          - web/packages/scripts/**/*
          - web/packages/common/**/*
          - web/packages/sdk/**/*

##################
###  LINTINGS  ###
##################

# SCRIPTS
web:scripts:check:
  extends: .pnpm
  needs: []
  stage: test
  script:
    - pnpm --filter ${PKG_NAME_SCRIPTS} check:ci
  <<: *rules_script_changes

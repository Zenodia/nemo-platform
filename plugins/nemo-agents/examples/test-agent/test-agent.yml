# test-agent.yml
#
# A minimal NAT workflow using the built-in test LLM — no API key or running
# inference endpoint required.  Use this to verify the plugin is wired up
# correctly before connecting to a real LLM.
#
# Usage:
#   nemo agents invoke --agent-config examples/test-agent/test-agent.yml --input "Hello"
#   nemo agents run   --agent-config examples/test-agent/test-agent.yml --port 8080

llms:
  main:
    _type: nat_test_llm
    response_seq:
      - "The answer to your question is 42."
      - "I'm a deterministic test LLM — no API key needed."
    delay_ms: 0

workflow:
  _type: chat_completion
  llm_name: main

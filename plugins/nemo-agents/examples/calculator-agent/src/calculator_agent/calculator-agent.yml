# calculator-agent.yml
#
# A ReAct agent with a calculator and datetime tool.
#
# The ``calculator`` function group matches NeMo-Agent-Toolkit's simple_calculator
# example (add/subtract/multiply/divide/compare). Install the sibling package so NAT
# loads its ``nat.components`` entry point:
#
#   uv pip install -e plugins/nemo-agents/examples/calculator-agent
#
# Platform-managed deployment:
#   nemo agents create --name calculator-agent \
#     --agent-config plugins/nemo-agents/examples/calculator-agent/src/calculator_agent/calculator-agent.yml
#   nemo agents deploy  --agent calculator-agent
#   nemo agents invoke  --agent calculator-agent --input "What is 12 * 8?"

function_groups:
  calculator:
    _type: calculator            # requires nemo-agents-example-calculator (pip install this dir)

functions:
  current_datetime:
    _type: current_datetime

llms:
  llm:
    _type: openai
    # base_url is injected by the platform controller at deploy time.
    # For local runs, override: --override llms.llm.base_url https://integrate.api.nvidia.com/v1
    api_key: not-used
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0

workflow:
  _type: react_agent
  tool_names: [calculator, current_datetime]
  llm_name: llm
  verbose: false
  parse_agent_response_max_retries: 3
  # Use the LLM's native tool-calling API (bind_tools) instead of NAT's text-mode
  # ReAct regex parser. The text parser in nvidia-nat-core>=1.7 rejects tool-call
  # output where JSON args are followed by trailing prose (e.g. Nemotron-3 emits
  # `{"numbers":[50,35]}\n\nThen we get ...`).
  use_native_tool_calling: true

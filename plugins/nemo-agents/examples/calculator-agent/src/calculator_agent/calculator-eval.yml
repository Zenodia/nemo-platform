# calculator-eval.yml
#
# Evaluation config for the calculator agent.
#
# This config only contains the eval section — not the agent workflow.
# The agent runs remotely (already deployed), and its endpoint is passed via
# the CLI:
#
#   nemo agents evaluate run \
#       --eval-config examples/calculator-agent/calculator-eval.yml \
#       --endpoint http://localhost:8080/generate
#
# Or, if the agent is platform-managed:
#
#   nemo agents evaluate run \
#       --eval-config examples/calculator-agent/calculator-eval.yml \
#       --agent calculator-agent
#
# The judge LLM evaluates the agent's answers against the expected answers in
# calculator-eval-data.json.  Set base_url to your inference endpoint.

llms:
  judge_llm:
    _type: openai
    # base_url and api_key are injected automatically by the platform
    # (routes through the Inference Gateway).  For local runs without the
    # platform, override via --base-url or NEMO_BASE_URL.
    #
    # ${NEMO_DEFAULT_MODEL} resolves to the model configured on the SDK
    # context (``nemo_platform.config.get_context().default_model``) so the
    # example works against whichever model your platform has registered as
    # a VirtualModel.  To pin a different judge, replace this with a
    # specific entity name (see `nemo inference virtual-models list
    # --workspace <ws>`).
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0
    max_tokens: 1024

eval:
  general:
    max_concurrency: 1
    output_dir: eval/calculator
    dataset:
      _type: json
      file_path: calculator-eval-data.json
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: judge_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.5
        correctness: 0.3
        relevance: 0.2
      judge_llm_prompt: >
        You are an evaluator. Score whether the generated answer correctly
        addresses the question compared to the expected answer description.
        Rules:
        - Score is a float between 0.0 and 1.0.
        - 1.0 means the answer fully satisfies the expected answer criteria.
        - Provide a 1-2 sentence reasoning.

# calculator-optimize.yml
#
# Optimization config for the calculator agent.
#
# This config tunes the agent's LLM hyperparameters (temperature, top_p) using
# Optuna-based numeric optimization to maximise eval accuracy.  The eval section
# reuses the same dataset and judge LLM as calculator-eval.yml.
#
# Usage:
#
#   nemo agents optimize run \
#       --optimize-config examples/calculator-agent/calculator-optimize.yml \
#       --agent calculator-agent
#
# A literal HTTP URL is still accepted for non-platform agent servers, but
# the parameter sweep is local-only in that mode and won't reach the remote
# agent — prefer the named-agent form whenever the agent is platform-managed:
#
#   nemo agents optimize run \
#       --optimize-config examples/calculator-agent/calculator-optimize.yml \
#       --agent http://localhost:8080
#
# See the NAT Optimizer Guide for full documentation on search spaces,
# prompt GA, and multi-objective tuning:
#   https://docs.nvidia.com/nemo/agent-toolkit/latest/improve-workflows/optimizer.html

llms:
  # LLM used by the agent workflow — its hyperparameters are optimised.
  # base_url and api_key are injected automatically by the platform
  # (routes through the Inference Gateway).  For local runs without the
  # platform, override via --base-url or NEMO_BASE_URL.
  #
  # ${NEMO_DEFAULT_MODEL} resolves to the model configured on the SDK
  # context (``nemo_platform.config.get_context().default_model``) so the
  # example works against whichever model your platform has registered as
  # a VirtualModel.  To pin a specific model, replace this with the entity
  # name (see `nemo inference virtual-models list --workspace <ws>`).
  llm:
    _type: openai
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0
    # Mark temperature and top_p as optimizable so the optimizer tunes them.
    optimizable_params:
      - temperature
      - top_p
    search_space:
      temperature:
        low: 0.0
        high: 0.8
        step: 0.2
      top_p:
        low: 0.5
        high: 1.0
        step: 0.1

  # Judge LLM used by the evaluator — not optimised.
  judge_llm:
    _type: openai
    model_name: ${NEMO_DEFAULT_MODEL}
    temperature: 0.0
    max_tokens: 1024

# Evaluation section — used by the optimizer to score each trial.
eval:
  general:
    max_concurrency: 4
    output_dir: eval/calculator
    dataset:
      _type: json
      file_path: calculator-eval-data.json
  evaluators:
    accuracy:
      _type: tunable_rag_evaluator
      llm_name: judge_llm
      default_scoring: true
      default_score_weights:
        coverage: 0.5
        correctness: 0.3
        relevance: 0.2
      judge_llm_prompt: >
        You are an evaluator. Score whether the generated answer correctly
        addresses the question compared to the expected answer description.
        Rules:
        - Score is a float between 0.0 and 1.0.
        - 1.0 means the answer fully satisfies the expected answer criteria.
        - Provide a 1-2 sentence reasoning.

# Optimizer section — controls the tuning strategy.
optimizer:
  output_path: optimizer_results/calculator

  # Numeric (Optuna) hyperparameter search over temperature and top_p.
  numeric:
    enabled: true
    n_trials: 3

  # Prompt GA is disabled for this example; enable and add
  # prompt-type search spaces to optimise system prompts.
  prompt:
    enabled: false

  # Run the workflow 3 times per parameter set for stable scoring.
  reps_per_param_set: 3

  # Metrics the optimizer tries to maximise / minimise.
  eval_metrics:
    accuracy:
      evaluator_name: accuracy
      direction: maximize
      weight: 1.0
